<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Jump Pro - Official Game Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .card {
            background: #111;
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .app-icon {
            font-size: 4rem;
            color: #ffce00;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 206, 0, 0.4);
        }
        h1 { font-size: 1.7rem; letter-spacing: 1px; margin-bottom: 5px; }
        .tagline { color: #777; font-size: 0.9rem; margin-bottom: 30px; }
        
        .game-features {
            text-align: left;
            background: #181818;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #bbb;
        }
        .feature i { color: #ffce00; margin-right: 12px; }

        /* QR Code Container */
        .qr-container {
            margin: 25px 0;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 20px;
            background: #000;
        }
        .qr-image {
            max-width: 200px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .upi-id {
            color: #888;
            font-size: 0.8rem;
            font-family: monospace;
            background: #1a1a1a;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .price-box {
            margin-bottom: 25px;
        }
        .current-price { font-size: 1.5rem; font-weight: bold; color: #27ae60; }

        /* Success Button */
        .get-btn {
            display: block;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            padding: 18px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(39, 174, 96, 0.2);
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .get-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(39, 174, 96, 0.4); }

        .secure-tag {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #444;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="app-icon"><i class="fas fa-dragon"></i></div>
        <h1>DINO JUMP PRO</h1>
        <p class="tagline">Official Game Hub & Multiplayer Suite</p>

        <div class="game-features">
            <div class="feature"><i class="fas fa-check"></i> Unlock 6 Premium Games</div>
            <div class="feature"><i class="fas fa-check"></i> Real-time Online Bingo</div>
            <div class="feature"><i class="fas fa-check"></i> No Ads - Lifetime Access</div>
            <div class="feature"><i class="fas fa-check"></i> Professional Sound Effects</div>
        </div>

        <p style="color: #ffce00; font-weight: bold;">Scan & Pay ₹2</p>

        <div class="qr-container">
            <img src="qr.png" alt="Payment QR Code" class="qr-image">
            <p class="upi-id">vishnurdj680-2@okicici</p>
        </div>

        <div class="price-box">
            <span class="current-price">Price: ₹2 Only</span>
        </div>

        <a href="success.html" class="get-btn">I PAID - GET GAME NOW</a>

        <div class="secure-tag">
            <span><i class="fas fa-shield-alt"></i> AD-FREE</span>
            <span><i class="fas fa-clock"></i> LIFETIME</span>
        </div>
    </div>

</body>
</html>
