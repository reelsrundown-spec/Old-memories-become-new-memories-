<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Jump Pro - Official Game Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .card {
            background: #111;
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .app-icon {
            font-size: 4rem;
            color: #ffce00;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 206, 0, 0.4);
        }
        h1 { font-size: 1.7rem; letter-spacing: 1px; margin-bottom: 5px; }
        .tagline { color: #777; font-size: 0.9rem; margin-bottom: 30px; }
        
        .game-features {
            text-align: left;
            background: #181818;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #bbb;
        }
        .feature i { color: #ffce00; margin-right: 12px; }

        .price-box {
            margin: 25px 0;
            padding: 15px;
            border: 1px dashed #27ae60;
            border-radius: 12px;
            background: rgba(39, 174, 96, 0.05);
        }
        .current-price { font-size: 2.2rem; font-weight: bold; color: #27ae60; }
        .old-price { text-decoration: line-through; color: #555; margin-right: 10px; }

        .pay-button {
            display: block;
            background: linear-gradient(135deg, #ffce00, #ff9900);
            color: #000;
            padding: 18px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 206, 0, 0.2);
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .pay-button:hover { transform: translateY(-3px); }

        .secure-tag {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #444;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="app-icon"><i class="fas fa-dragon"></i></div>
        <h1>DINO JUMP PRO</h1>
        <p class="tagline">Official Game Hub & Multiplayer Suite</p>

        <div class="game-features">
            <div class="feature"><i class="fas fa-check"></i> Unlock 6 Premium Games</div>
            <div class="feature"><i class="fas fa-check"></i> Real-time Online Bingo</div>
            <div class="feature"><i class="fas fa-check"></i> No Ads - Lifetime Access</div>
            <div class="feature"><i class="fas fa-check"></i> Professional Sound Effects</div>
        </div>

        <div class="price-box">
            <span class="old-price">₹99</span>
            <span class="current-price">₹2 ONLY</span>
        </div>

        <a href="YOUR_PAYMENT_LINK_HERE" class="pay-button">PAY & UNLOCK NOW</a>

        <div class="secure-tag">
            <span><i class="fas fa-lock"></i> SECURE UPI</span>
            <span><i class="fas fa-bolt"></i> INSTANT ACCESS</span>
        </div>
    </div>

</body>
</html>
