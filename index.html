<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Jump Pro - Official Game Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #111; max-width: 400px; width: 100%; border-radius: 30px; padding: 35px 25px; text-align: center; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .app-icon { font-size: 3.5rem; color: #ffce00; margin-bottom: 10px; }
        h1 { font-size: 1.6rem; letter-spacing: 1px; margin-bottom: 5px; }
        .tagline { color: #777; font-size: 0.85rem; margin-bottom: 25px; }
        
        .game-features { text-align: left; background: #181818; padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .feature { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.85rem; color: #bbb; }
        .feature i { color: #ffce00; margin-right: 12px; }

        .qr-section { background: #000; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .qr-image { width: 100%; max-width: 180px; border-radius: 10px; margin-bottom: 10px; }
        .upi-text { font-size: 0.75rem; color: #ffce00; font-family: monospace; }

        .get-btn { 
            display: block; background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; 
            padding: 18px; text-decoration: none; border-radius: 15px; font-size: 1.1rem; 
            font-weight: 800; transition: 0.3s; width: 100%; border: none; cursor: pointer;
        }
        .get-btn:active { transform: scale(0.98); }
        .secure-tag { margin-top: 20px; font-size: 0.7rem; color: #444; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon"><i class="fas fa-dragon"></i></div>
        <h1>DINO JUMP PRO</h1>
        <p class="tagline">Premium Game Hub & Multiplayer</p>

        <div class="game-features">
            <div class="feature"><i class="fas fa-check"></i> Unlock 6 Premium Games</div>
            <div class="feature"><i class="fas fa-check"></i> Real-time Online Bingo</div>
            <div class="feature"><i class="fas fa-check"></i> No Ads - Lifetime Access</div>
        </div>

        <p style="color: #bbb; font-size: 0.9rem; margin-bottom: 15px;">Scan & Pay <b>₹2</b> to Unlock</p>

        <div class="qr-section">
            <img src="qr.png" alt="Scan to Pay" class="qr-image">
            <p class="upi-text">vishnurdj680-2@okicici</p>
        </div>

        <a href="success.html" class="get-btn">I PAID - OPEN HUB <i class="fas fa-lock-open"></i></a>

        <div class="secure-tag">
            <span><i class="fas fa-shield-alt"></i> AD-FREE</span>
            <span><i class="fas fa-bolt"></i> INSTANT ACCESS</span>
        </div>
    </div>
</body>
</html>
