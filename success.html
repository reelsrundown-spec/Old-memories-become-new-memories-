<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Access Dino Jump Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0a; 
            color: white; 
            text-align: center; 
            padding: 60px 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .success-card { 
            border: 2px solid #27ae60; 
            padding: 40px 30px; 
            border-radius: 25px; 
            max-width: 400px; 
            width: 100%;
            background: #111;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }
        .check-icon {
            font-size: 5rem;
            color: #27ae60;
            margin-bottom: 20px;
            display: block;
        }
        h1 { color: #27ae60; font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #888; margin-bottom: 35px; line-height: 1.6; }
        
        .access-btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #00e5ff, #00acc1); 
            color: #000; 
            padding: 18px 40px; 
            text-decoration: none; 
            border-radius: 15px; 
            font-weight: 800; 
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3);
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        .access-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.5);
        }
        .note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <span class="check-icon">✓</span>
        <h1>Payment Success!</h1>
        <p>Your payment was confirmed. You have unlocked the premium version of <b>Dino Jump Pro</b> Game Hub.</p>
        
        <a href="hub.html" class="access-btn">OPEN GAME HUB</a>
        
        <div class="note">
            Lifetime Access Unlocked.
        </div>
    </div>

</body>
</html>
